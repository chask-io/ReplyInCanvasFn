function:
  name: ReplyInCanvasFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: >
    Reply to a member inside the canvas conversation tied to the current
    process-mapping orchestration event.
  timeout: 120
  memory_size: 256
  type: function
  layers:
    - foundationMinimal
    - foundationApi
  parameters:
    required:
      - name: reasoning
        type: string
        description: Explanation of why this canvas reply should be sent.
      - name: content
        type: string
        description: Plain text reply to append to the member's canvas conversation.
  widget:
    enabled: false
    type: dynamic_widget
    params: []
  testing:
    handles_files: false
    produces_files: false
  environment:
    BASE_DOMAIN: icier-vampishly-tangela.ngrok-free.app
